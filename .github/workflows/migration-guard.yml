name: Prisma Migration Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prisma schema/migration consistency
        run: npm run ci:migration-guard
