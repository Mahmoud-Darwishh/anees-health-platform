name: CI

# Quality gate for every push and pull request.
# - quality:    lint + type-check (fast, no database, no secrets)
# - test:       vitest unit suite + tenant-scope / RBAC / security-policy guards
# - migrations: guard against schema/migration drift (throwaway Postgres)
# - build:      production `next build` against a throwaway Postgres
#
# No real secrets are used anywhere. The build job points at a disposable
# Postgres service container and uses placeholder values for Medplum/R2 —
# public pages never call those services at build time. The production
# database is NEVER touched by CI.

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci # postinstall runs `prisma generate`, so tsc sees the client

      - name: Lint
        run: npm run lint

      - name: Lint CSS (logical-properties guard)
        run: npm run lint:css

      - name: Lint CSS (hardcoded-colour guard)
        run: npm run lint:color

      - name: Type-check
        run: npm run typecheck

      # Fail the build on any CRITICAL advisory in runtime (production) deps.
      # Dev/build-only advisories (vitest, workbox) are reported below but do
      # not block, matching the staged "report first, then gate" rollout.
      - name: Dependency audit — fail on critical runtime advisories
        run: npm audit --omit=dev --audit-level=critical

      - name: Dependency audit — full report (informational)
        run: npm audit --omit=dev || true

  test:
    name: Unit tests & policy guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci # postinstall runs `prisma generate`

      - name: Unit tests (vitest)
        run: npm run test

      - name: RBAC matrix guard
        run: npm run lint:rbac

      - name: Security-policy self-test
        run: npm run test:security-policy

      - name: Tenant-scope guard
        run: npm run lint:tenant

  migrations:
    name: Migration drift guard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: anees
          POSTGRES_PASSWORD: anees
          POSTGRES_DB: anees_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anees"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://anees:anees@localhost:5432/anees_ci
      SHADOW_DATABASE_URL: postgresql://anees:anees@localhost:5432/anees_shadow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create shadow database
        run: PGPASSWORD=anees psql -h localhost -U anees -d anees_ci -c 'CREATE DATABASE anees_shadow;'

      - name: Guard against schema/migration drift
        # Fails (exit 2) if prisma/schema.prisma has changes not captured in a
        # committed migration — i.e. someone edited the schema without running
        # `npm run db:migrate`.
        run: npm run ci:migration-guard

  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: anees
          POSTGRES_PASSWORD: anees
          POSTGRES_DB: anees_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anees"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://anees:anees@localhost:5432/anees_ci
      # Build-time placeholders only — never real secrets. Public pages that are
      # prerendered at build time read Postgres only; Medplum/R2 are not called.
      AUTH_SECRET: ci-build-placeholder-secret
      MEDPLUM_BASE_URL: https://medplum.invalid/
      MEDPLUM_CLIENT_ID: ci-build-placeholder
      MEDPLUM_CLIENT_SECRET: ci-build-placeholder
      R2_ACCOUNT_ID: ci-build-placeholder
      R2_BUCKET: ci-build-placeholder
      R2_ACCESS_KEY_ID: ci-build-placeholder
      R2_SECRET_ACCESS_KEY: ci-build-placeholder
      EHR_MALWARE_SCAN_BACKEND: mock_clean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed public catalog (doctors)
        # Gives generateStaticParams real doctor slugs so the build prerenders
        # the same public pages it would in production.
        run: npm run db:seed:doctors

      - name: Build
        run: npm run build
