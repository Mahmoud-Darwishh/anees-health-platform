# =============================================================================
# Anees Health · Metabase · Nginx reverse proxy  (analytics.aneeshealth.com)
# =============================================================================
# Place at /etc/nginx/sites-available/analytics.aneeshealth.com and symlink into
# sites-enabled. Issue the TLS cert with:
#
#   sudo certbot --nginx -d analytics.aneeshealth.com
#
# (certbot fills in the ssl_certificate lines automatically). Metabase listens on
# 127.0.0.1:3001 (3000 was already in use by another process on this VPS);
# this is its only public door.
# =============================================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name analytics.aneeshealth.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.aneeshealth.com;

    # --- TLS (certbot manages these two lines) ---
    # ssl_certificate     /etc/letsencrypt/live/analytics.aneeshealth.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/analytics.aneeshealth.com/privkey.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;      # Metabase must never be iframed here
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- OPTIONAL hard lock-down: allow only known staff egress IPs ---
    # Uncomment and list your office / VPN IPs if they are stable. This is the
    # single strongest control — it blocks the whole internet before auth.
    # allow 197.0.0.0/24;   # example: office range
    # allow 41.0.0.0/24;    # example: VPN egress
    # deny all;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
