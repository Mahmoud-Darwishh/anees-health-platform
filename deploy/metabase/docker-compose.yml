# =============================================================================
# Anees Health · Metabase · self-hosted stack (Hostinger VPS)
# =============================================================================
# Metabase (open-source) + its OWN metadata Postgres. This is a SEPARATE stack
# from the Medplum compose — put it in /opt/metabase/ on the VPS.
#
#   cd /opt/metabase && docker compose up -d && docker compose logs -f metabase
#
# TLS/public routing: this VPS already runs Traefik (net: host, providers.docker=true,
# exposedbydefault=false, Let's Encrypt via HTTP challenge) as the ONE public door on
# 80/443 for every service on the box, including Medplum. So Metabase is NOT fronted by
# its own Nginx — it's discovered by Traefik via the `traefik.*` labels below, which also
# get it its HTTPS certificate automatically. (nginx-metabase.conf in this folder is kept
# only as a reference for a plain-Nginx environment; it is NOT used on this VPS.)
#
# The host port binding below (3002) is for LOCAL curl/debug only — Traefik reaches the
# container directly over the Docker network using the label-declared port 3000, not the
# host mapping.
# =============================================================================

services:
  metabase:
    image: metabase/metabase:v0.63.1.2       # PIN a tag — never :latest. Verified current stable as of 2026-07-20.
    container_name: anees-metabase
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=Host(`analytics.aneeshealth.com`)"
      - "traefik.http.routers.metabase.entrypoints=websecure"
      - "traefik.http.routers.metabase.tls.certresolver=letsencrypt"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"
    ports:
      - "127.0.0.1:3002:3000"               # local debug only; Traefik routes via the labels above, not this mapping
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase-db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabaseapp
      MB_DB_USER: metabaseapp
      MB_DB_PASS: ${MB_DB_PASS}
      MB_ENCRYPTION_SECRET_KEY: ${MB_ENCRYPTION_SECRET_KEY}   # ESCROW THIS — losing it means re-entering data-source creds
      MB_SITE_URL: https://analytics.aneeshealth.com
      MB_ENABLE_PUBLIC_SHARING: "false"     # no anonymous public links, ever (PHI-adjacent data)
      MB_ENABLE_EMBEDDING: "false"
      MB_SESSION_MAX_AGE: "480"             # 8-hour absolute session
      MB_SESSION_COOKIES: "true"            # also expire on browser close
      MB_PASSWORD_COMPLEXITY: strong
      JAVA_TIMEZONE: Africa/Cairo
      JAVA_TOOL_OPTIONS: -Xmx1500m          # ~80% of this container's RAM — raise only if the VPS has headroom
    extra_hosts:
      - "host.docker.internal:host-gateway" # lets Metabase reach the operational Postgres on the host
    depends_on:
      metabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "-I", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks: [metanet]

  metabase-db:
    image: postgres:16
    container_name: anees-metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabaseapp
      POSTGRES_USER: metabaseapp
      POSTGRES_PASSWORD: ${MB_DB_PASS}
    volumes:
      - metabase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabaseapp -d metabaseapp"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [metanet]

volumes:
  metabase_pgdata:

networks:
  metanet:
    driver: bridge
